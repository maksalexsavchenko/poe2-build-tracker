services:
  nginx:
    image: nginx:alpine
    container_name: poe2_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/ssl/cloudflare.pem:/etc/ssl/cloudflare.pem:ro
      - /etc/ssl/cloudflare.key:/etc/ssl/cloudflare.key:ro
    depends_on:
      - nextjs
    restart: always

  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poe2_nextjs
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://poe2user:${POSTGRES_PASSWORD}@postgres:5432/poe2db
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_URL=https://poe2-build-tracker.online
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - GGG_CLIENT_ID=${GGG_CLIENT_ID}
      - GGG_CLIENT_SECRET=${GGG_CLIENT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  postgres:
    image: postgres:16-alpine
    container_name: poe2_postgres
    environment:
      - POSTGRES_USER=poe2user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=poe2db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poe2user -d poe2db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: poe2_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: always

volumes:
  postgres_data:
  redis_data:
