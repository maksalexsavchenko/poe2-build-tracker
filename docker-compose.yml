services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poe2_nextjs
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://poe2user:${POSTGRES_PASSWORD}@postgres:5432/poe2db
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_URL=https://poe2-build-tracker.online
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - GGG_CLIENT_ID=${GGG_CLIENT_ID}
      - GGG_CLIENT_SECRET=${GGG_CLIENT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    networks:
      - default
      - traefik_proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_proxy
      - traefik.http.middlewares.poe2-redirect-https.redirectscheme.scheme=https
      - traefik.http.middlewares.poe2-redirect-https.redirectscheme.permanent=true
      - traefik.http.routers.poe2-web.rule=Host(`poe2-build-tracker.online`) || Host(`www.poe2-build-tracker.online`)
      - traefik.http.routers.poe2-web.entrypoints=${TRAEFIK_ENTRYPOINT_HTTP:-web}
      - traefik.http.routers.poe2-web.middlewares=poe2-redirect-https
      - traefik.http.routers.poe2-web.service=noop@internal
      - traefik.http.routers.poe2-websecure.rule=Host(`poe2-build-tracker.online`) || Host(`www.poe2-build-tracker.online`)
      - traefik.http.routers.poe2-websecure.entrypoints=${TRAEFIK_ENTRYPOINT_HTTPS:-websecure}
      - traefik.http.routers.poe2-websecure.tls=true
      - traefik.http.routers.poe2-websecure.tls.certresolver=${TRAEFIK_CERTRESOLVER:-le}
      - traefik.http.services.poe2-app.loadbalancer.server.port=3000
      - traefik.http.routers.poe2-websecure.service=poe2-app

  postgres:
    image: postgres:16-alpine
    container_name: poe2_postgres
    environment:
      - POSTGRES_USER=poe2user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=poe2db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poe2user -d poe2db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: poe2_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: always

networks:
  traefik_proxy:
    external: true

volumes:
  postgres_data:
  redis_data:
